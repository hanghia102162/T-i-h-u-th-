<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tỏ tình ❤️</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Pacifico&display=swap"
      rel="stylesheet"
    />

    <!-- FontAwesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Montserrat", sans-serif;
      }

      body {
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
          135deg,
          #ff9a9e 0%,
          #fecfef 50%,
          #feada6 100%
        );
        overflow: hidden;
        padding: 20px;
        position: relative;
      }

      /* Floating Background Hearts */
      .bg-heart {
        position: fixed;
        color: rgba(255, 255, 255, 0.45);
        pointer-events: none;
        z-index: 0;
        animation: floatBg 8s linear infinite;
      }

      @keyframes floatBg {
        0% {
          transform: translateY(105vh) rotate(0deg) scale(0.8);
          opacity: 0;
        }
        20% {
          opacity: 0.7;
        }
        100% {
          transform: translateY(-10vh) rotate(360deg) scale(1.2);
          opacity: 0;
        }
      }

      .container {
        position: relative;
        z-index: 1;
        width: min(620px, 92vw);
        background: rgba(255, 255, 255, 0.93);
        backdrop-filter: blur(15px);
        padding: 35px 25px;
        border-radius: 28px;
        text-align: center;
        box-shadow:
          0 20px 50px rgba(255, 77, 121, 0.25),
          0 0 0 1px rgba(255, 255, 255, 0.6);
        animation: float 4s ease-in-out infinite;
        transition: transform 0.3s ease;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      /* Cute GIF Banner */
      .gif-container {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
      }

      .cute-gif {
        height: 150px;
        max-width: 100%;
        object-fit: contain;
        border-radius: 20px;
        filter: drop-shadow(0 8px 15px rgba(255, 77, 121, 0.2));
        transition: all 0.3s ease;
      }

      h1 {
        font-family: "Pacifico", cursive;
        color: #ff3f6c;
        font-size: clamp(26px, 4.5vw, 38px);
        margin-bottom: 15px;
        text-shadow: 2px 2px 4px rgba(255, 77, 121, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      h1 i {
        font-size: 0.8em;
        color: #ff2d55;
        animation: pulseIcon 1.5s infinite;
      }

      @keyframes pulseIcon {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }

      p#question {
        font-size: clamp(19px, 3.2vw, 24px);
        font-weight: 600;
        color: #444;
        margin-bottom: 30px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.3s ease;
      }

      .answers {
        display: flex;
        justify-content: center;
        gap: 20px;
        align-items: center;
        position: relative;
        min-height: 90px;
      }

      button {
        border: none;
        cursor: pointer;
        border-radius: 50px;
        font-weight: 700;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        outline: none;
        user-select: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        -webkit-tap-highlight-color: transparent;
      }

      #yes {
        padding: 16px 36px;
        font-size: clamp(18px, 3vw, 24px);
        background: linear-gradient(45deg, #ff4d79, #ff2d55);
        color: white;
        box-shadow: 0 10px 25px rgba(255, 45, 85, 0.4);
        animation: heartbeat 1.2s infinite;
        z-index: 2;
      }

      #yes.fullscreen {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100dvh !important;
        border-radius: 0 !important;
        transform: none !important;
        font-size: clamp(40px, 9vw, 85px) !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        z-index: 99999 !important;
        animation: none !important;
        background: linear-gradient(135deg, #ff4d79, #ff2d55) !important;
      }

      @keyframes heartbeat {
        0%,
        100% {
          transform: scale(1);
        }
        25% {
          transform: scale(1.06);
        }
        50% {
          transform: scale(1);
        }
        75% {
          transform: scale(1.09);
        }
      }

      #yes:hover {
        box-shadow: 0 15px 35px rgba(255, 45, 85, 0.6);
        filter: brightness(1.05);
      }

      #no {
        padding: 16px 36px;
        font-size: clamp(18px, 3vw, 24px);
        background: #f0f0f0;
        color: #666;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
        z-index: 1;
      }

      #no:hover {
        background: #e4e4e4;
        color: #333;
      }

      .heart {
        position: fixed;
        bottom: -30px;
        pointer-events: none;
        z-index: 999999;
        animation: fly 4s ease-out forwards;
      }

      @keyframes fly {
        0% {
          transform: translateY(0) rotate(0deg) scale(0.5);
          opacity: 1;
        }
        100% {
          transform: translateY(-115vh) rotate(360deg) scale(1.5);
          opacity: 0;
        }
      }

      /* SUCCESS PAGE */
      #successPage {
        position: fixed;
        inset: 0;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: linear-gradient(
          135deg,
          #ff758c 0%,
          #ff7eb3 50%,
          #ff4d79 100%
        );
        color: white;
        z-index: 999999;
        text-align: center;
        padding: 20px;
        animation: fadeIn 0.6s ease forwards;
      }

      .success-gif {
        height: 180px;
        max-width: 90%;
        object-fit: contain;
        border-radius: 20px;
        margin-bottom: 25px;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      }

      #successPage h1 {
        font-family: "Pacifico", cursive;
        font-size: clamp(34px, 7vw, 65px);
        margin-bottom: 15px;
        color: white;
        text-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      }

      #successPage p {
        font-size: clamp(19px, 3.5vw, 28px);
        font-weight: 600;
        color: rgba(255, 255, 255, 0.95);
        margin-bottom: 25px;
        line-height: 1.4;
      }

      .big-heart-icon {
        font-size: clamp(60px, 12vw, 100px);
        color: #fff;
        animation: heartbeat 1s infinite;
        filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <!-- Main Container -->
    <div class="container" id="mainContainer">
      <!-- Cute GIF Banner -->
      <div class="gif-container">
        <img
          id="statusGif"
          class="cute-gif"
          src="5396c2561c99075688c061fb7f8354c5.gif"
          alt="Cute GIF"
        />
      </div>

      <h1>
        <i class="fa-solid fa-heart"></i>
        Tối hậu thư
        <i class="fa-solid fa-heart"></i>
      </h1>

      <p id="question">
        <i class="fa-solid fa-wand-magic-sparkles" style="color: #ff4d79"></i>
        em uống trà sữa ko anh mua ship cho => đồng ý nhắn anh nhé anh chờ =}}
        đố em bấm 0 được!
      </p>

      <div class="answers">
        <button id="yes">
          <i class="fa-solid fa-heart-circle-check"></i> Có ❤️
        </button>
        <button id="no">
          <i class="fa-solid fa-heart-crack"></i> Không 💔
        </button>
      </div>
    </div>

    <!-- Success Page -->
    <div id="successPage">
      <img
        class="success-gif"
        src="105b485b4b17cad937ff0840246a3403.gif"
        alt="Love Hug GIF"
      />
      <h1><i class="fa-solid fa-face-kiss-wink-heart"></i> okok em ❤️</h1>
      <p>chờ tí anh ship cho =}} 💕✨</p>
      <div class="big-heart-icon">
        <i class="fa-solid fa-heart"></i>
      </div>
    </div>

    <script>
      const yes = document.getElementById("yes");
      const no = document.getElementById("no");
      const question = document.getElementById("question");
      const mainContainer = document.getElementById("mainContainer");
      const successPage = document.getElementById("successPage");
      const statusGif = document.getElementById("statusGif");

      let scale = 1;
      let isFullScreen = false;

      // GIF cute duy trì cho các lần bấm Không
      const gifs = ["5396c2561c99075688c061fb7f8354c5.gif"];

      // Đảm bảo nếu GIF gặp lỗi sẽ tự quay về GIF mặc định không bị biến mất
      statusGif.onerror = () => {
        statusGif.src = "5396c2561c99075688c061fb7f8354c5.gif";
      };

      const texts = [
        "Suy nghĩ lại nha 🥺",
        "Chắc chắn không sao? 😢",
        "Thử bấm Có đi mà ❤️",
        "Đừng từ chối anh nhé 😭",
        "cho bấm lại 🥹",
        "Bấm Có đi nhéeee 💕",
        "Năn nỉ luôn á 🥺💖",
        "Chỉ một cái bấm Có thôi mà! 🌹",
      ];

      let index = 0;

      function initBgHearts() {
        const hearts = ["❤️", "💖", "💕", "🌸", "✨", "💗"];
        for (let i = 0; i < 16; i++) {
          const bgHeart = document.createElement("div");
          bgHeart.className = "bg-heart";
          bgHeart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
          bgHeart.style.left = Math.random() * 100 + "vw";
          bgHeart.style.fontSize = 15 + Math.random() * 25 + "px";
          bgHeart.style.animationDuration = 6 + Math.random() * 6 + "s";
          bgHeart.style.animationDelay = Math.random() * 5 + "s";
          document.body.appendChild(bgHeart);
        }
      }
      initBgHearts();

      function handleYesClick() {
        createHearts();
        launchConfetti();
        playCuteSound();

        mainContainer.style.display = "none";
        if (yes.parentNode === document.body) {
          yes.remove();
        }
        successPage.style.display = "flex";
      }

      yes.addEventListener("click", handleYesClick);

      no.addEventListener("click", () => {
        scale += 0.35;

        question.innerHTML = `<i class="fa-solid fa-heart-pulse" style="color: #ff2d55;"></i> ${texts[index % texts.length]}`;
        statusGif.src = gifs[index % gifs.length];
        index++;

        if (scale < 3) {
          yes.style.transform = `scale(${scale})`;
          const noScale = Math.max(0.3, 1 - (scale - 1) * 0.25);
          no.style.transform = `scale(${noScale})`;
        } else if (!isFullScreen) {
          isFullScreen = true;
          yes.classList.add("fullscreen");
          yes.innerHTML = '<i class="fa-solid fa-heart"></i> CÓ ❤️';

          document.body.appendChild(yes);

          if (no) no.style.display = "none";
        }
      });

      function createHearts() {
        const heartIcons = ["❤️", "💖", "💕", "💗", "💓", "✨"];
        for (let i = 0; i < 50; i++) {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.innerHTML =
            heartIcons[Math.floor(Math.random() * heartIcons.length)];
          heart.style.left = Math.random() * 100 + "vw";
          heart.style.fontSize = 20 + Math.random() * 35 + "px";
          heart.style.animationDuration = 2.5 + Math.random() * 2.5 + "s";
          document.body.appendChild(heart);

          setTimeout(() => heart.remove(), 5000);
        }
      }

      function launchConfetti() {
        if (typeof confetti === "function") {
          const duration = 4 * 1000;
          const end = Date.now() + duration;

          (function frame() {
            confetti({
              particleCount: 5,
              angle: 60,
              spread: 55,
              origin: { x: 0, y: 0.7 },
            });
            confetti({
              particleCount: 5,
              angle: 120,
              spread: 55,
              origin: { x: 1, y: 0.7 },
            });

            if (Date.now() < end) {
              requestAnimationFrame(frame);
            }
          })();
        }
      }

      function playCuteSound() {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();

          const notes = [523.25, 659.25, 783.99, 1046.5];
          notes.forEach((freq, idx) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "sine";
            osc.frequency.value = freq;

            gain.gain.setValueAtTime(0.15, ctx.currentTime + idx * 0.12);
            gain.gain.exponentialRampToValueAtTime(
              0.001,
              ctx.currentTime + idx * 0.12 + 0.6,
            );

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start(ctx.currentTime + idx * 0.12);
            osc.stop(ctx.currentTime + idx * 0.12 + 0.6);
          });
        } catch (e) {}
      }
    </script>
  </body>
</html>
